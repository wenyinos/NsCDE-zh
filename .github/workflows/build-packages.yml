name: Build and Test Packages

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  # Debian/Ubuntu 包构建
  build-debian:
    runs-on: ubuntu-latest
    container: debian:bookworm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            libc6-dev libxext-dev x11proto-dev libx11-dev libxpm-dev \
            ksh autotools-dev automake build-essential debhelper-compat=13 \
            gettext dpkg-dev devscripts

      - name: Build Debian package
        run: |
          # 准备 debian 目录
          cp -r pkg/debian ./debian/
          
          # 获取版本号
          VERSION=$(git describe --tags --always 2>/dev/null || echo "2.3.1")
          VERSION=${VERSION#v}
          
          # 手动创建 changelog
          DATE=$(date -R)
          printf "nscde-zh (%s-1) unstable; urgency=medium\n\n  * Automated build from GitHub Actions\n\n -- GitHub Actions <github-actions@github.com>  %s\n" "${VERSION}" "${DATE}" > debian/changelog
          
          # 构建包
          dpkg-buildpackage -rfakeroot -us -uc -b
          
          # 调试：列出生成的文件（包括父目录）
          echo "=== All .deb files ==="
          cd .. && find . -maxdepth 3 -name "*.deb" -type f 2>/dev/null && cd -
          
          # 移动 .deb 文件到当前目录
          cd .. && mv nscde*.deb NsCDE-zh/ 2>/dev/null || true && cd -

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: "*.deb"
          retention-days: 5
          if-no-files-found: warn

      - name: Test installation
        run: |
          if ls *.deb 1> /dev/null 2>&1; then
            apt-get install -y ./nscde-zh_*.deb || echo "Installation test completed (dependency issues expected in CI)"
          fi

  # Arch Linux 包构建
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            base-devel git autoconf automake libx11 libxext libxpm \
            ksh stalonetray xsettingsd imagemagick xorg-xprop xorg-xrdb \
            xorg-xset xorg-xdpyinfo xorg-xrandr python python-pyxdg \
            python-yaml python-psutil python-qtpy xdotool xdg-utils \
            gettext groff ttf-dejavu \
            fvwm3 xorg-xrefresh xorg-xmodmap xterm \
            noto-fonts-cjk

      - name: Build Arch package
        run: |
          # 创建非 root 用户用于构建
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

          # 获取版本号
          VERSION=$(git describe --tags --always 2>/dev/null || echo "2.3.1")
          VERSION=${VERSION#v}

          # 准备 PKGBUILD
          cp pkg/pacman/PKGBUILD ./PKGBUILD
          
          # 更新版本信息
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" PKGBUILD
          sed -i "s|^pkgrel=.*|pkgrel=1|" PKGBUILD
          
          # 修正依赖包名（fonts-noto-cjk -> noto-fonts-cjk）
          sed -i "s|'fonts-noto-cjk'|'noto-fonts-cjk'|" PKGBUILD
          
          # 更新 source URL（使用正确的 tag 格式 vX.Y.Z_zh）
          sed -i "s|v2.3.1_zh.tar.gz|v${VERSION}_zh.tar.gz|" PKGBUILD
          
          # 更新 build() 和 package() 中的目录名（添加 _zh 后缀）
          sed -i "s|NsCDE-zh-\$pkgver|NsCDE-zh-\${pkgver}_zh|g" PKGBUILD

          # 设置目录权限
          chown -R builder:builder .

          # 使用非 root 用户构建
          su - builder -c "cd $PWD && makepkg -sf --noconfirm"
          
          # 调试：列出生成的文件
          echo "=== Arch packages generated ==="
          ls -la *.pkg.tar.zst 2>/dev/null || echo "No .pkg.tar.zst files found"

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: "*.pkg.tar.zst"
          retention-days: 5
          if-no-files-found: warn

      - name: Test installation
        run: |
          if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
            pacman -U --noconfirm *.pkg.tar.zst || echo "Installation test completed"
          fi

  # Fedora/RHEL RPM 包构建
  build-rpm-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build rpmdevtools autoconf automake gcc make \
            ksh gettext-devel libX11-devel libXt-devel libXext-devel \
            libXpm-devel glibc-headers python3-PyQt5 python3-psutil \
            python3-pyxdg python3-pyyaml stalonetray xsettingsd \
            xterm xdotool xdg-utils groff-base dejavu-serif-fonts \
            wget || true

      - name: Build RPM package
        run: |
          # 设置 RPM 构建环境
          rpmdev-setuptree
          
          # 获取版本号
          VERSION=$(git describe --tags --always 2>/dev/null || echo "2.3.1")
          VERSION=${VERSION#v}
          
          # 准备 spec 文件
          cp pkg/rpm/NsCDE.spec ~/rpmbuild/SPECS/NsCDE.spec
          
          # 创建源码包（目录名必须匹配 autosetup -n 参数）
          tar -czf ~/rpmbuild/SOURCES/NsCDE-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='debian' \
            --exclude='pkg' \
            --transform "s|^|NsCDE-${VERSION}_zh/|" \
            .
          
          # 验证源码包内容
          echo "=== Source package contents ==="
          tar -tzf ~/rpmbuild/SOURCES/NsCDE-${VERSION}.tar.gz | head -5
          
          # 构建 RPM
          rpmbuild -ba ~/rpmbuild/SPECS/NsCDE.spec \
            --define "version ${VERSION}" \
            --define "_topdir ${HOME}/rpmbuild"
          
          # 调试：列出生成的文件
          echo "=== RPM files generated ==="
          find ~/rpmbuild -name "*.rpm" -type f

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm-packages
          path: |
            ~/rpmbuild/RPMS/**/*.rpm
            ~/rpmbuild/SRPMS/**/*.rpm
          retention-days: 5
          if-no-files-found: warn

  # Ubuntu 特定构建
  build-ubuntu:
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            libc6-dev libxext-dev libx11-dev libxpm-dev \
            ksh autotools-dev automake build-essential debhelper-compat=13 \
            gettext dpkg-dev fakeroot devscripts

      - name: Build Ubuntu package
        run: |
          # 准备 debian 目录
          cp -r pkg/debian ./debian/
          
          # 获取版本号
          VERSION=$(git describe --tags --always 2>/dev/null || echo "2.3.1")
          VERSION=${VERSION#v}
          
          # 手动创建 changelog
          DATE=$(date -R)
          printf "nscde-zh (%s-1ubuntu1) jammy; urgency=medium\n\n  * Automated Ubuntu build from GitHub Actions\n\n -- GitHub Actions <github-actions@github.com>  %s\n" "${VERSION}" "${DATE}" > debian/changelog
          
          # 构建包
          dpkg-buildpackage -rfakeroot -us -uc -b
          
          # 调试：列出生成的文件（包括父目录）
          echo "=== All .deb files ==="
          cd .. && find . -maxdepth 3 -name "*.deb" -type f 2>/dev/null && cd -
          
          # 移动 .deb 文件到当前目录
          cd .. && mv nscde*.deb NsCDE-zh/ 2>/dev/null || true && cd -

      - name: Upload Ubuntu artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-packages
          path: "*.deb"
          retention-days: 5
          if-no-files-found: warn

  # 源码编译测试
  build-from-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake gcc make \
            libx11-dev libxext-dev libxpm-dev \
            ksh gettext

      - name: Configure
        run: |
          ./autogen.sh
          ./configure --prefix=/usr

      - name: Build
        run: make

      - name: Check build artifacts
        run: |
          echo "Build completed successfully"
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          find . -name "*.so" -o -name "nscde" 2>/dev/null | head -20

  # 发布包（仅在打标签时）
  release:
    needs: [build-debian, build-arch, build-rpm-fedora, build-ubuntu, build-from-source]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug artifacts structure
        run: |
          echo "=== Artifacts structure ==="
          find artifacts -type f 2>/dev/null | head -50

      - name: Delete existing release assets
        run: |
          # 获取已存在的 release assets 并删除
          ASSETS=$(curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v2.3.1_zh/assets" 2>/dev/null)
          
          echo "Existing assets: $ASSETS"
          
          # 删除不需要的 assets
          for asset_id in $(echo "$ASSETS" | python3 -c "import sys,json; [print(a['id']) for a in json.load(sys.stdin) if any(x in a['name'] for x in ['debug', 'dbgsym', 'src.rpm'])]"); do
            echo "Deleting asset $asset_id"
            curl -sL -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/debian-packages/nscde-zh_2.3.1-1_amd64.deb
            artifacts/ubuntu-packages/nscde-zh_2.3.1-1ubuntu1_amd64.deb
            artifacts/arch-packages/nscde-zh-2.3.1-1-x86_64.pkg.tar.zst
            artifacts/fedora-rpm-packages/RPMS/x86_64/NsCDE-2.3.1-1.fc43.x86_64.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
