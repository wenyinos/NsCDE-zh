# NsCDE Wayland - LavaLauncher Configuration
# CDE-style application launcher bar
#
# Icon paths assume NsCDE icons installed to /usr/share/icons/NsCDE/.
# Adjust base path if using a different PREFIX (e.g., /usr/local/share/icons/NsCDE/).

global-settings
{
    watch-config-file = true;
}

bar
{
    position          = bottom;
    layer             = bottom;
    mode              = full;
    size              = 48;
    icon-padding      = 6;
    exclusive-zone    = true;
    background-colour = "#b8b8b8";
    border            = 2 2 2 2;
    border-colour     = "#ffffff";
    radius            = 0;

    button
    {
        image-path = /usr/share/icons/NsCDE/48x48/apps/utilities-terminal.png;
        command    = "nscde-wayland-run foot";
    }

    button
    {
        image-path = /usr/share/icons/NsCDE/48x48/apps/system-file-manager.png;
        command    = "nscde-wayland-run app pcmanfm-qt";
    }

    button
    {
        image-path = /usr/share/icons/NsCDE/48x48/apps/system-run.png;
        command    = "nscde-wayland-run fuzzel";
    }
}
